name: CI/CD - Festival DevOps Music Fest

on:
  push:
    branches: [ master, feature-* ]
  pull_request:
    branches: [ master ]

jobs:

  # ─────────────────────────────────────
  # JOB 1: Validar estructura del proyecto
  # ─────────────────────────────────────
  validar-estructura:
    name: Validar estructura del proyecto
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Verificar archivos obligatorios
        run: |
          echo "🔍 Verificando estructura del proyecto..."
          test -f docker-compose.yml && echo "✅ docker-compose.yml encontrado" || exit 1
          test -f frontend/Dockerfile && echo "✅ frontend/Dockerfile encontrado" || exit 1
          test -f backend/Dockerfile && echo "✅ backend/Dockerfile encontrado" || exit 1
          test -f frontend/index.html && echo "✅ frontend/index.html encontrado" || exit 1
          test -f backend/app.py && echo "✅ backend/app.py encontrado" || exit 1
          test -f backend/requirements.txt && echo "✅ backend/requirements.txt encontrado" || exit 1
          echo "✅ Estructura del proyecto validada correctamente"

  # ─────────────────────────────────────
  # JOB 2: Build de imágenes Docker
  # ─────────────────────────────────────
  build-docker:
    name: Build imágenes Docker
    runs-on: ubuntu-latest
    needs: validar-estructura

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build imagen frontend
        run: |
          echo "🐳 Construyendo imagen del frontend..."
          docker build -t festival-frontend:latest ./frontend
          echo "✅ Imagen frontend construida"

      - name: Build imagen backend
        run: |
          echo "🐳 Construyendo imagen del backend..."
          docker build -t festival-backend:latest ./backend
          echo "✅ Imagen backend construida"

      - name: Listar imágenes construidas
        run: docker images | grep festival

  # ─────────────────────────────────────
  # JOB 3: Validar docker-compose
  # ─────────────────────────────────────
  validar-compose:
    name: Validar docker-compose.yml
    runs-on: ubuntu-latest
    needs: build-docker

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Crear archivo .env para pruebas
        run: |
          echo "DB_NAME=festival_db" >> .env
          echo "DB_USER=festival_user" >> .env
          echo "DB_PASSWORD=festival_pass" >> .env
          echo "MYSQL_ROOT_PASSWORD=root_secret_2026" >> .env

      - name: Validar sintaxis de docker-compose.yml
        run: |
          echo "🔍 Validando docker-compose.yml..."
          docker compose config
          echo "✅ docker-compose.yml válido"

  # ─────────────────────────────────────
  # JOB 4: Notificación final
  # ─────────────────────────────────────
  notificacion:
    name: Pipeline completado
    runs-on: ubuntu-latest
    needs: [validar-estructura, build-docker, validar-compose]

    steps:
      - name: Resumen del pipeline
        run: |
          echo "🎉 Pipeline CI/CD completado exitosamente"
          echo "────────────────────────────────────"
          echo "✅ Estructura validada"
          echo "✅ Imágenes Docker construidas"
          echo "✅ docker-compose.yml validado"
          echo "────────────────────────────────────"
          echo "🚀 Proyecto listo para despliegue"
